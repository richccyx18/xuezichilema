<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>йӣӘеӯҗ</title>
<style>
  html,body { margin:0; height:100%; }
  body {
    background:radial-gradient(120% 120% at 50% 0%, #3a1c33 0%, #2a1424 60%);
    color:#fff; font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100%; gap:18px; padding:30px; overflow-x:hidden; position:relative;
  }
  .bg{ position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
  .bg span{ position:absolute; will-change:transform; animation:drift var(--dur,16s) ease-in-out infinite alternate; }
  @keyframes drift{ from{transform:translate(0,0) rotate(0)} to{transform:translate(var(--dx,30px),var(--dy,-20px)) rotate(var(--rot,60deg))} }
  /* е°ҸеҘіеӯ©е–қй…’еҗғйҘӯ */
  .girl{ position:fixed; right:12px; bottom:12px; width:104px; height:104px; z-index:5; pointer-events:none; }
  .girl>div{ position:absolute; }
  .girl .g{ left:30px; bottom:22px; font-size:44px; transform-origin:bottom; animation:gbob .9s ease-in-out infinite; }
  .girl .wine{ left:6px; bottom:30px; font-size:30px; transform-origin:bottom right; animation:sip 2.6s ease-in-out infinite; }
  .girl .food{ left:52px; bottom:0; font-size:38px; filter:drop-shadow(0 3px 5px rgba(0,0,0,.4)); }
  .girl .steam{ left:60px; bottom:42px; display:flex; gap:5px; }
  .girl .steam i{ width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,.55); animation:steam 1.7s ease-in infinite; }
  .girl .steam i:nth-child(2){ animation-delay:.6s } .girl .steam i:nth-child(3){ animation-delay:1.2s }
  @keyframes gbob{ 0%,100%{transform:translateY(0) scaleY(1)} 50%{transform:translateY(2px) scaleY(.96)} }
  @keyframes sip{ 0%,68%,100%{transform:translate(0,6px) rotate(0)} 80%,90%{transform:translate(16px,-10px) rotate(-32deg)} }
  @keyframes steam{ 0%{opacity:0;transform:translateY(0) scale(.5)} 30%{opacity:.7} 100%{opacity:0;transform:translateY(-22px) scale(1.4)} }
  h1 { font-size:46px; font-weight:900; letter-spacing:2px; margin:0 0 4px; text-align:center;
       background:linear-gradient(135deg,#ffd0e6,#ff5fa2 60%,#e8a33d);
       -webkit-background-clip:text; background-clip:text; color:transparent;
       filter:drop-shadow(0 6px 16px rgba(255,95,162,.35)); animation:bob 3s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  .slogan { font-size:15px; line-height:1.9; text-align:center; max-width:300px; font-weight:600; color:#ffe0ee;
            padding:13px 20px; border-radius:16px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);
            box-shadow:0 6px 18px rgba(0,0,0,.25); }
  a {
    display:flex; align-items:center; justify-content:center;
    width:min(80vw,300px); padding:22px; border-radius:18px;
    color:#fff; text-decoration:none; font-size:21px; font-weight:700;
    box-shadow:0 6px 18px rgba(0,0,0,.4);
  }
  .eat  { background:#ff5fa2; }
  .drink{ background:#e8a33d; }
  .hint { font-size:13px; opacity:.6; margin-top:14px; text-align:center; line-height:1.6; }
</style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <h1>рҹҚ“ йӣӘеӯҗ</h1>
  <a class="eat"   href="eat.html">рҹҚҪпёҸ йӣӘеӯҗеҗғдәҶеҗ—пјҹ</a>
  <a class="drink" href="drink.html">рҹҚә йӣӘеӯҗе–қдәҶеҗ—пјҹ</a>
  <div class="slogan">дёҚз®ЎејҖеҝғиҝҳжҳҜйҡҫиҝҮпјҢйғҪиҰҒи®°еҫ—еҘҪеҘҪеҗғйҘӯ рҹҚҡ</div>
  <div class="hint">зӮ№иҝӣеҺ»иҪ¬зӣҳеҗҺпјҢ<br>з”Ё SafariгҖҢеҲҶдә« вҶ’ ж·»еҠ еҲ°дё»еұҸе№•гҖҚж”ҫжЎҢйқў</div>

  <div class="girl" aria-hidden="true">
    <div class="steam"><i></i><i></i><i></i></div>
    <div class="wine">рҹҚ·</div>
    <div class="g">рҹ‘§</div>
    <div class="food">рҹҚң</div>
  </div>

  <script>
  (function(){
    var E=["вқ„пёҸ","вқ„пёҸ","вқ„пёҸ","вқ„пёҸ","вқ„пёҸ","рҹҗҺ","рҹҗҺ","рҹҗҺ","рҹҗҺ","рҹҗҺ","рҹҚә","рҹҚә","рҹҚ“","рҹ§Ӣ","рҹҚ·","рҹҘӮ","рҹҚ°","рҹҚЈ","рҹҚұ","рҹҚҷ"];
    var bg=document.getElementById("bg");
    for(var i=0;i<26;i++){ var s=document.createElement("span");
      s.textContent=E[Math.floor(Math.random()*E.length)];
      s.style.left=(Math.random()*94).toFixed(1)+"%"; s.style.top=(Math.random()*92).toFixed(1)+"%";
      s.style.fontSize=(20+Math.random()*24).toFixed(0)+"px"; s.style.opacity=(0.14+Math.random()*0.16).toFixed(2);
      s.style.setProperty("--dx",(Math.random()*160-80).toFixed(0)+"px");
      s.style.setProperty("--dy",(Math.random()*160-80).toFixed(0)+"px");
      s.style.setProperty("--rot",(Math.random()*300-150).toFixed(0)+"deg");
      s.style.setProperty("--dur",(12+Math.random()*16).toFixed(0)+"s");
      s.style.animationDelay=(-Math.random()*24).toFixed(1)+"s";
      bg.appendChild(s);
    }
  })();
  </script>
</body>
</html>
