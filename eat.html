<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>雪子吃了吗？</title>
<style>
  :root { --bg:#ffe0ec; --card:#ffffff; --accent:#ff5fa2; --text:#6b3a52; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { background:#ffe0ec; }
  html,body { margin:0; height:100%; }
  body {
    background:radial-gradient(120% 120% at 50% 0%, #fff4f9 0%, var(--bg) 60%);
    color:var(--text); font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; padding:18px 16px 28px; gap:14px; user-select:none;
  }
  h1 { font-size:22px; margin:4px 0 0; font-weight:700; letter-spacing:1px; }
  .cats { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:440px; }
  .cat {
    border:1px solid rgba(0,0,0,.08); background:var(--card); color:var(--text);
    padding:7px 13px; border-radius:999px; font-size:14px; cursor:pointer; transition:.15s;
    box-shadow:0 2px 6px rgba(0,0,0,.06);
  }
  .cat.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
  .stage { position:relative; width:min(86vw,340px); aspect-ratio:1/1; margin-top:4px; }
  .pointer {
    position:absolute; top:-6px; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent;
    border-top:22px solid var(--accent); z-index:5; filter:drop-shadow(0 2px 3px rgba(0,0,0,.5));
  }
  #wheel { width:100%; height:100%; transform:rotate(0deg); }
  .spinning #wheel { transition:transform 4.2s cubic-bezier(.17,.67,.2,1); }
  .hub {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:74px; height:74px; border-radius:50%; background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700;
    cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.45); z-index:4;
  }
  .result { font-size:26px; font-weight:800; min-height:34px; text-align:center; }
  .result span { color:var(--accent); }
  .again {
    border:none; background:var(--accent); color:#fff; font-size:17px; font-weight:700;
    padding:12px 30px; border-radius:999px; cursor:pointer; box-shadow:0 4px 14px rgba(255,122,89,.4);
  }
  .again:active { transform:scale(.96); }
  .hint { font-size:13px; opacity:.6; margin-top:-4px; }
  .bg{ position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
  .bg span{ position:absolute; will-change:transform; animation:drift var(--dur,16s) ease-in-out infinite alternate; }
  @keyframes drift{ from{transform:translate(0,0) rotate(0)} to{transform:translate(var(--dx,30px),var(--dy,-20px)) rotate(var(--rot,60deg))} }
</style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <h1>雪子吃了吗？ 🍓</h1>
  <div class="cats" id="cats"></div>
  <div class="stage" id="stage">
    <div class="pointer"></div>
    <canvas id="wheel" width="600" height="600"></canvas>
    <div class="hub" id="hub">开转</div>
  </div>
  <div class="result" id="result">选个类别，点中间开转</div>
  <button class="again" id="again">再转一次</button>
  <div class="hint">点中间转盘或下方按钮都行</div>

<script>
(function(){
  var E=["🍜","🍔","🍣","🍕","🍗","🍙","🥟","🌮","🍱","🍰","🍤","🍚","🍛","🍲","🍢","🍦","🍓","🧆"];
  var bg=document.getElementById("bg");
  for(var i=0;i<24;i++){ var s=document.createElement("span"); s.textContent=E[Math.floor(Math.random()*E.length)];
    s.style.left=(Math.random()*94).toFixed(1)+"%"; s.style.top=(Math.random()*92).toFixed(1)+"%";
    s.style.fontSize=(20+Math.random()*22).toFixed(0)+"px"; s.style.opacity=(0.1+Math.random()*0.14).toFixed(2);
    s.style.setProperty("--dx",(Math.random()*400-200).toFixed(0)+"px"); s.style.setProperty("--dy",(Math.random()*400-200).toFixed(0)+"px");
    s.style.setProperty("--rot",(Math.random()*480-240).toFixed(0)+"deg"); s.style.setProperty("--dur",(4.5+Math.random()*5.5).toFixed(1)+"s");
    s.style.animationDelay=(-Math.random()*24).toFixed(1)+"s"; bg.appendChild(s); }
})();
const MENU = {
  "全部随机":   [],
  "贵州粉面":   ["牛肉粉","羊肉粉","肠旺面","素粉","酸汤粉","卷粉","脆哨面","花溪牛肉粉"],
  "安顺小吃":   ["裹卷","丝娃娃","破酥包","小锅凉粉","夺夺粉","油炸鸡蛋糕","荞凉粉","洋芋粑"],
  "镇宁特色":   ["镇宁狗肉","花江狗肉","布依簸箕宴","五色糯米饭","血豆腐","酸菜豆米汤","折耳根凉拌","波波糖"],
  "贵州炒菜":   ["辣子鸡","酸汤鱼","糟辣脆皮鱼","折耳根炒腊肉","回锅肉","小炒肉","干锅鸡","宫保鸡丁"],
  "常见快餐":   ["黄焖鸡","兰州拉面","卤肉饭","盖浇饭","排骨饭","沙县小吃","麻辣烫","煲仔饭"],
  "西式快餐":   ["汉堡","炸鸡","披萨","薯条","意面","卷饼","三明治","鸡肉卷"],
  "火锅烧烤":   ["豆米火锅","酸汤鱼火锅","烙锅","串串香","冒菜","烧烤","烤鱼","狼牙土豆"],
  "夜宵甜品":   ["卤味","炒田螺","烤洋芋","糯米饭","冰浆","玫瑰冰粉","米凉虾","奶茶"]
};
const COLORS = ["#ff7a59","#ffb454","#ffd56b","#7ed6a5","#5cc8ff","#9d8cff","#ff8fb1","#67e0c9"];

const cv = document.getElementById("wheel");
const ctx = cv.getContext("2d");
const stage = document.getElementById("stage");
const resultEl = document.getElementById("result");
let current = Object.keys(MENU).find(k => k !== "全部随机") || "全部随机";
let items = [];
let angle = 0;       // 当前转盘角度(度)
let spinning = false;

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function pool(cat){
  if(cat === "全部随机"){
    const all = Object.entries(MENU).filter(([k])=>k!=="全部随机").flatMap(([,v])=>v);
    return shuffle(all).slice(0,10);   // 太多挤不下，每次随机抽10个上盘
  }
  return (MENU[cat] || []).slice();
}

function buildCats(){
  const box = document.getElementById("cats");
  box.innerHTML = "";
  Object.keys(MENU).forEach(cat=>{
    const b = document.createElement("div");
    b.className = "cat" + (cat===current ? " active":"");
    b.textContent = cat;
    b.onclick = ()=>{ if(spinning) return; current=cat; setCategory(); };
    box.appendChild(b);
  });
}

function setCategory(){
  items = pool(current);
  angle = 0;
  stage.classList.remove("spinning");
  cv.style.transform = "rotate(0deg)";
  buildCats();
  draw();
  resultEl.innerHTML = "点中间开转 👇";
}

function draw(){
  const N = items.length, R = 300, cx = 300, cy = 300;
  ctx.clearRect(0,0,600,600);
  const step = (Math.PI*2)/N;
  for(let i=0;i<N;i++){
    const a0 = -Math.PI/2 + i*step;       // 从正上方开始
    const a1 = a0 + step;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,a0,a1);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    // 文字
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(a0 + step/2);
    ctx.fillStyle = "#3a2a18";
    ctx.font = "bold 22px -apple-system,'PingFang SC',sans-serif";
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillText(items[i], R-18, 0);
    ctx.restore();
  }
  // 外圈
  ctx.beginPath(); ctx.arc(cx,cy,R-1,0,Math.PI*2);
  ctx.lineWidth = 6; ctx.strokeStyle = "rgba(255,255,255,.25)"; ctx.stroke();
}

function spin(){
  if(spinning || !items.length) return;
  spinning = true;
  resultEl.innerHTML = "转动中…";
  const N = items.length, step = 360/N;
  const idx = Math.floor(Math.random()*N);
  // 指针在正上方，第 idx 段中心当前在 (idx*step + step/2) 处(顺时针,0=正上)
  const center = idx*step + step/2;
  const turns = 5 + Math.floor(Math.random()*3);   // 5~7 圈
  const target = angle + turns*360 + (360 - (((angle % 360) + center) % 360));
  angle = target;
  stage.classList.add("spinning");
  cv.style.transform = `rotate(${target}deg)`;
  setTimeout(()=>{
    spinning = false;
    resultEl.innerHTML = "雪子今天吃：<span>"+items[idx]+"</span>";
  }, 4300);
}

document.getElementById("hub").onclick = spin;
document.getElementById("again").onclick = spin;

setCategory();
</script>
</body>
</html>
